name: Buscador Automatico de Grupos

on:
  schedule:
    # Se ejecutará automáticamente cada hora
    - cron: '0 * * * *'
  workflow_dispatch:
    # Esto nos activa un botón para probarlo manualmente cuando queramos

jobs:
  escanear:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ejecutar Script Cazador
        run: node bot.js
